# Cache Cleaner Configuration
# Threshold in MB (default: 1024 = 1GB)
THRESHOLD_MB=1024

# Check interval in seconds (default: 3600 = 1 hour)
CHECK_INTERVAL=3600

# Minimum time between clean operations in seconds (default: 1800 = 30 min)
MIN_CLEAN_INTERVAL=1800

# Log file location
LOG_FILE=/sdcard/Android/cache_cleaner/logs.txt

# Stats file location
STATS_FILE=/sdcard/Android/cache_cleaner/stats.json

# Lock file location
LOCK_FILE=/data/local/tmp/cache_cleaner.lock

# Paths to clean (space-separated)
CACHE_PATHS="
/data/data/*/cache/*
/data/data/*/code_cache/*
/data/user_de/*/*/cache/*
/data/user_de/*/*/code_cache/*
/sdcard/Android/data/*/cache/*
"

# Enable verbose logging (true/false)
VERBOSE_LOG=true
